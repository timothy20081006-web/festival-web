<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>店長後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-content { display: none; }
        .page-content.active { display: block; }
        .order-card { border: 3px solid #000; background: #fff; }
        .item-row { border-bottom: 2px solid #f0f0f0; padding: 10px 0; }
        .item-row:last-child { border-bottom: none; }
    </style>
</head>
<body class="bg-gray-100">

    <nav class="bg-black text-white p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex gap-6 font-bold">
            <button onclick="showPage('home')">控制台</button>
            <button onclick="showPage('stats')">統計/重設</button>
        </div>
        <div class="text-xl font-black text-yellow-400">總營收: <span id="total-rev">$ 0</span></div>
    </nav>

    <main class="p-4 max-w-6xl mx-auto">
        <div id="page-home" class="page-content active">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="active-orders"></div>
        </div>

        <div id="page-stats" class="page-content">
            <div id="stat-list" class="bg-white border-2 border-black p-6 space-y-2 mb-10"></div>
            <button onclick="resetData()" class="w-full bg-red-600 text-white font-bold py-6">⚠️ 清空所有資料與號碼</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = { /* ...同前... */ };
        const db = getDatabase(initializeApp(firebaseConfig));

        window.showPage = (p) => {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
        };

        onValue(ref(db, 'orders'), (snap) => {
            const data = snap.val();
            const activeDiv = document.getElementById('active-orders');
            const statDiv = document.getElementById('stat-list');
            let rev = 0; const stats = {};
            activeDiv.innerHTML = ''; 

            for (let id in data) {
                const o = data[id];
                rev += o.price;

                // 解析內容：格式為 "1份 x [2球]|口味|配料 ## 2份 x [3球]|口味|配料"
                const orders = o.items.split(' ## ');
                const orderItemsHTML = orders.map(orderStr => {
                    const [qty, detail] = orderStr.split(' x ');
                    const [plan, flavors, tops] = detail.split('|');
                    
                    // 統計累計
                    flavors.split('+').forEach(f => stats[f] = (stats[f]||0) + parseInt(qty));
                    tops.split(',').forEach(t => {
                        const [name, count] = t.split('x');
                        stats[name] = (stats[name]||0) + (parseInt(count) * parseInt(qty));
                    });

                    return `
                        <div class="item-row">
                            <div class="flex justify-between font-black text-blue-700">
                                <span>${qty} ${plan}</span>
                            </div>
                            <div class="text-xl font-bold mt-1 text-black">${flavors.replace(/\+/g, ' + ')}</div>
                            <div class="text-sm text-gray-500 mt-1">└ 配料: ${tops}</div>
                        </div>`;
                }).join('');

                if (o.status !== 'done') {
                    const card = document.createElement('div');
                    card.className = `order-card p-4 ${o.status==='ready'?'bg-yellow-50 border-blue-600':''}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-4xl font-black">#${o.orderNum}</span>
                            <span class="bg-black text-white px-2 py-1 text-sm">$${o.price}</span>
                        </div>
                        <div class="border-t-2 border-black mt-2">${orderItemsHTML}</div>
                        <div class="mt-4 flex gap-2">
                            ${o.status==='waiting'?
                                `<button onclick="u('${id}','ready')" class="w-full bg-black text-white py-4 font-black text-xl">叫號</button>`:
                                `<button onclick="u('${id}','done')" class="w-full bg-green-600 text-white py-4 font-black text-xl">結案</button>`
                            }
                        </div>`;
                    activeDiv.appendChild(card);
                }
            }
            document.getElementById('total-rev').innerText = `$ ${rev}`;
            statDiv.innerHTML = '<h3 class="font-black border-b pb-2 mb-4">銷售總計</h3>' + 
                Object.entries(stats).map(([k,v]) => `<div class="flex justify-between"><span>${k}</span><b>${v}</b></div>`).join('');
        });

        window.u = (id, s) => update(ref(db, 'orders/'+id), {status:s});
        window.resetData = () => confirm("確定重設？") && set(ref(db,'/'), {currentNumber:100, orders:null}).then(()=>location.reload());
    </script>
</body>
</html>
