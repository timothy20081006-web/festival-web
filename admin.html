<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; }
        .stat-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid #1e293b; }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-100 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-white">COMMAND CENTER</h1>
                <p class="text-slate-500 text-xs mt-1">REAL-TIME ORDER MANAGEMENT</p>
            </div>
            <div class="flex gap-4">
                <div class="stat-card px-10 py-5 rounded-[2rem] shadow-2xl">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Total Revenue</p>
                    <h2 id="totalRevenue" class="text-4xl font-black text-emerald-400">$ 0</h2>
                </div>
                <div class="stat-card px-10 py-5 rounded-[2rem] shadow-2xl">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Total Orders</p>
                    <h2 id="totalOrders" class="text-4xl font-black text-indigo-400">0</h2>
                </div>
            </div>
        </header>

        <div id="list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'orders'), (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('list');
            let rev = 0, count = 0; listDiv.innerHTML = '';

            for (let id in data) {
                const order = data[id];
                rev += (order.price || 0); count++;
                if (order.status === 'done') continue;

                const card = document.createElement('div');
                card.className = `stat-card p-6 rounded-[2.5rem] border-t-4 transition-all duration-500 ${order.status === 'ready' ? 'border-emerald-500 shadow-emerald-900/10' : 'border-indigo-500'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-5xl font-black text-white">#${order.orderNum}</span>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-slate-500 block">TOTAL</span>
                            <span class="text-xl font-bold text-emerald-400">$${order.price}</span>
                        </div>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-2xl mb-6 min-h-[80px]">
                        <p class="text-slate-300 leading-relaxed font-medium">${order.items}</p>
                    </div>
                    <div class="flex gap-2">
                        ${order.status === 'waiting' ? 
                            `<button onclick="u('${id}', 'ready')" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-black text-xs tracking-widest transition">CALL (叫號)</button>` :
                            `<button onclick="u('${id}', 'done')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-2xl font-black text-xs tracking-widest transition">FINISH (結案)</button>`
                        }
                    </div>
                `;
                listDiv.appendChild(card);
            }
            document.getElementById('totalRevenue').innerText = `$ ${rev}`;
            document.getElementById('totalOrders').innerText = count;
        });
        window.u = (id, s) => update(ref(db, 'orders/' + id), { status: s });
    </script>
</body>
</html>
