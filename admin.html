<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>店長後台 - 108 冰淇淋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-content { display: none; }
        .page-content.active { display: block; }
        .order-card { border: 3px solid #000; background: #fff; margin-bottom: 1.5rem; }
        .item-row { border-bottom: 2px solid #f0f0f0; padding: 10px 0; }
        .item-row:last-child { border-bottom: none; }
        #conn-status { height: 4px; width: 100%; position: fixed; top: 0; left: 0; z-index: 100; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="conn-status" class="bg-red-600"></div>

    <nav class="bg-black text-white p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex gap-6 font-bold text-sm">
            <button onclick="showPage('home')">控制台</button>
            <button onclick="showPage('stats')">統計/重設</button>
        </div>
        <div class="text-lg font-black text-yellow-400">總收: <span id="total-rev">$ 0</span></div>
    </nav>

    <main class="p-4 max-w-6xl mx-auto">
        <div id="page-home" class="page-content active">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="active-orders">
                </div>
        </div>
        <div id="page-stats" class="page-content">
            <div id="stat-list" class="bg-white border-2 border-black p-6 space-y-2 mb-10 text-black"></div>
            <button onclick="resetData()" class="w-full bg-red-600 text-white font-bold py-6">⚠️ 清空所有資料與號碼</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e",
            storageBucket: "school-festival-pos-f2c1e.firebasestorage.app",
            messagingSenderId: "135308112776",
            appId: "1:135308112776:web:6935bd537916dbbda9c03d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 連線監測
        onValue(ref(db, ".info/connected"), (snap) => {
            const statusEl = document.getElementById('conn-status');
            statusEl.className = snap.val() === true ? "bg-green-500" : "bg-red-600";
        });

        window.showPage = (p) => {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
        };

        window.u = (id, s) => update(ref(db, 'orders/'+id), {status:s});
        window.resetData = () => confirm("確定重設？") && set(ref(db,'/'), {currentNumber:100, orders:null}).then(()=>location.reload());

        // 訂單監聽與渲染
        onValue(ref(db, 'orders'), (snap) => {
            const data = snap.val();
            const activeDiv = document.getElementById('active-orders');
            const statDiv = document.getElementById('stat-list');
            let rev = 0; const stats = {};
            activeDiv.innerHTML = ''; 

            if(!data) {
                activeDiv.innerHTML = '<div class="p-10 text-center text-gray-500">尚無訂單</div>';
                document.getElementById('total-rev').innerText = "$ 0";
                return;
            }

            for (let id in data) {
                const o = data[id];
                rev += o.price;
                if (o.status === 'done') continue;

                let orderItemsHTML = '';
                try {
                    const orders = o.items.includes(' ## ') ? o.items.split(' ## ') : [o.items];
                    orderItemsHTML = orders.map(orderStr => {
                        if (orderStr.includes('|')) {
                            const parts = orderStr.split('|');
                            const qtyAndPlan = parts[0].split(' x ');
                            const qtyRaw = qtyAndPlan[0] || '1份';
                            const qty = qtyRaw.replace('份', '') + '份'; 
                            const plan = qtyAndPlan[1] || '';
                            const flavors = parts[1] || '';
                            const tops = parts[2] || '';
                            
                            // 統計
                            const qInt = parseInt(qtyRaw) || 1;
                            flavors.split('+').forEach(f => stats[f] = (stats[f]||0) + qInt);
                            tops.split(',').forEach(t => {
                                const [name, count] = t.split('x');
                                stats[name] = (stats[name]||0) + ((parseInt(count)||0) * qInt);
                            });

                            return `
                                <div class="item-row">
                                    <div class="font-black text-blue-700">${qty} ${plan}</div>
                                    <div class="text-xl font-bold mt-1 text-black">${flavors.replace(/\+/g, ' + ')}</div>
                                    <div class="text-xs text-gray-500 mt-1">└ 配料: ${tops}</div>
                                </div>`;
                        }
                        return `<div class="item-row text-black font-bold">${orderStr}</div>`;
                    }).join('');
                } catch (e) {
                    orderItemsHTML = `<div class="text-red-500">解析錯誤</div>`;
                }

                const card = document.createElement('div');
                card.className = `order-card p-4 ${o.status==='ready'?'bg-yellow-50 border-blue-600':''}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-4xl font-black text-black">#${o.orderNum}</span>
                        <span class="bg-black text-white px-2 py-1 text-sm font-bold">$${o.price}</span>
                    </div>
                    <div class="border-t-2 border-black mt-2 text-left">${orderItemsHTML}</div>
                    <div class="mt-4 flex gap-2">
                        ${o.status==='waiting'?
                            `<button onclick="u('${id}','ready')" class="w-full bg-black text-white py-4 font-black text-xl">叫號</button>`:
                            `<button onclick="u('${id}','done')" class="w-full bg-green-600 text-white py-4 font-black text-xl">結案</button>`
                        }
                    </div>`;
                activeDiv.appendChild(card);
            }
            document.getElementById('total-rev').innerText = `$ ${rev}`;
            statDiv.innerHTML = '<h3 class="font-black border-b pb-2 mb-4">銷售總計</h3>' + 
                Object.entries(stats).map(([k,v]) => `<div class="flex justify-between"><span>${k}</span><b>${v}</b></div>`).join('');
        });
    </script>
</body>
</html>
