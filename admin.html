<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>後台管理 - 簡潔版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 p-4">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border">
            <div>
                <p class="text-xs text-gray-400 font-bold">TOTAL REVENUE</p>
                <h2 id="totalRevenue" class="text-2xl font-black text-blue-600">$ 0</h2>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-400 font-bold">TOTAL ORDERS</p>
                <h2 id="totalOrders" class="text-2xl font-black text-gray-700">0</h2>
            </div>
        </div>

        <div id="list" class="space-y-3">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'orders'), (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('list');
            let rev = 0, count = 0; 
            listDiv.innerHTML = '';

            const entries = Object.entries(data || {}).sort((a, b) => b[1].timestamp - a[1].timestamp);

            entries.forEach(([id, order]) => {
                rev += (order.price || 0); count++;
                if (order.status === 'done') return;

                const item = document.createElement('div');
                item.className = `flex justify-between items-center p-4 rounded-xl border bg-white shadow-sm ${order.status === 'ready' ? 'border-green-500 ring-2 ring-green-100' : 'border-gray-200'}`;
                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-2xl font-black w-12">#${order.orderNum}</span>
                        <div>
                            <p class="text-sm font-bold text-gray-700">${order.items}</p>
                            <p class="text-xs text-gray-400">$${order.price}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        ${order.status === 'waiting' ? 
                            `<button onclick="u('${id}', 'ready')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">叫號</button>` :
                            `<button onclick="u('${id}', 'done')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold">結案</button>`
                        }
                    </div>
                `;
                listDiv.appendChild(item);
            });
            document.getElementById('totalRevenue').innerText = `$ ${rev}`;
            document.getElementById('totalOrders').innerText = count;
        });
        window.u = (id, s) => update(ref(db, 'orders/' + id), { status: s });
    </script>
</body>
</html>
