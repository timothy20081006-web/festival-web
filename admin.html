<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店長後台 - Look In My Ice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-black text-white p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex gap-6 font-bold">
            <button onclick="showTab('active')" class="hover:text-pink-400">控制台</button>
            <button onclick="showTab('history')" class="hover:text-pink-400">訂單紀錄</button>
            <button onclick="showTab('stats')" class="hover:text-pink-400">品項統計</button>
        </div>
        <div class="text-yellow-400 font-black">今日營收：$<span id="total-revenue">0</span></div>
    </nav>

    <div class="p-4 max-w-4xl mx-auto">
        <div id="tab-active" class="tab-content">
            <h2 class="text-xl font-bold mb-4 border-l-4 border-pink-500 pl-2">待處理訂單</h2>
            <div id="active-orders" class="grid gap-4"></div>
        </div>

        <div id="tab-history" class="tab-content hidden">
            <h2 class="text-xl font-bold mb-4 border-l-4 border-gray-500 pl-2">已完成訂單 (最近 50 筆)</h2>
            <div id="history-orders" class="grid gap-4"></div>
        </div>

        <div id="tab-stats" class="tab-content hidden">
            <h2 class="text-xl font-bold mb-4 border-l-4 border-blue-500 pl-2">銷售總計</h2>
            <div class="bg-white p-6 rounded-xl shadow-md">
                <div id="stats-list" class="space-y-2"></div>
                <button onclick="resetAllData()" class="w-full mt-10 bg-red-600 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                    ⚠️ 清空所有資料與號碼
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e",
            storageBucket: "school-festival-pos-f2c1e.firebasestorage.app",
            messagingSenderId: "135308112776",
            appId: "1:135308112776:web:6935bd537916dbbda9c03d"
        };
        const db = getDatabase(!getApps().length ? initializeApp(firebaseConfig) : getApps()[0]);

        // 切換分頁
        window.showTab = (tabName) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
        };

        // 監聽資料庫
        onValue(ref(db, 'orders'), (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                renderEmpty();
                return;
            }

            const orders = Object.entries(data).map(([id, val]) => ({ id, ...val }));
            orders.sort((a, b) => b.timestamp - a.timestamp);

            renderActive(orders.filter(o => o.status === 'waiting'));
            renderHistory(orders.filter(o => o.status === 'done').slice(0, 50));
            renderStats(orders);
        });

        // 渲染待處理訂單
        function renderActive(list) {
            const container = document.getElementById('active-orders');
            container.innerHTML = list.length ? '' : '<p class="text-gray-400">尚無待處理訂單</p>';
            list.forEach(o => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow-md border-l-8 border-pink-500 flex justify-between items-center";
                card.innerHTML = `
                    <div>
                        <div class="text-2xl font-black">#${o.orderNum} <span class="text-sm text-gray-400">$${o.price}</span></div>
                        <div class="text-sm text-blue-600 mt-1">${o.items.replace(/ ## /g, '<br>')}</div>
                    </div>
                    <button onclick="markDone('${o.id}')" class="bg-black text-white px-6 py-3 rounded-lg font-bold">叫號 (Ready)</button>
                `;
                container.appendChild(card);
            });
        }

        // 渲染歷史訂單
        function renderHistory(list) {
            const container = document.getElementById('history-orders');
            container.innerHTML = list.length ? '' : '<p class="text-gray-400">尚無完成紀錄</p>';
            list.forEach(o => {
                const card = document.createElement('div');
                card.className = "bg-gray-50 p-3 rounded-lg border border-gray-200 flex justify-between opacity-70";
                card.innerHTML = `
                    <div class="text-sm">
                        <span class="font-bold">#${o.orderNum}</span> - ${o.items.split(' ## ')[0]}...
                    </div>
                    <span class="text-green-600 font-bold">已完成</span>
                `;
                container.appendChild(card);
            });
        }

        // 渲染統計與修正空行
        function renderStats(allOrders) {
            const stats = {};
            let totalRev = 0;
            
            allOrders.forEach(o => {
                totalRev += (o.price || 0);
                // 解析項目
                const parts = o.items.split(' ## ');
                parts.forEach(p => {
                    if(!p.trim()) return; // 修正：跳過空字串防止出現空行
                    const name = p.split('|')[0] || "未知品項";
                    stats[name] = (stats[name] || 0) + 1;
                });
            });

            document.getElementById('total-revenue').innerText = totalRev;
            const statsList = document.getElementById('stats-list');
            statsList.innerHTML = Object.entries(stats).map(([name, count]) => `
                <div class="flex justify-between border-b py-2">
                    <span class="font-medium">${name}</span>
                    <span class="font-black">${count}</span>
                </div>
            `).join('');
        }

        function renderEmpty() {
            document.getElementById('active-orders').innerHTML = "尚無訂單";
            document.getElementById('stats-list').innerHTML = "";
            document.getElementById('total-revenue').innerText = "0";
        }

        window.markDone = (id) => {
            update(ref(db, `orders/${id}`), { status: 'done' });
        };

        window.resetAllData = () => {
            if (confirm("確定要清空所有資料嗎？這將會重設訂單號碼並刪除所有紀錄！")) {
                remove(ref(db, 'orders'));
                set(ref(db, 'currentNumber'), 100);
                alert("已重設完成");
            }
        };
    </script>
</body>
</html>
