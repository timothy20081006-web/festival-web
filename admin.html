<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b-2 border-black pb-4">
            <h1 class="text-2xl font-bold">訂單管理系統</h1>
            <div class="text-right font-bold text-xl">今日營收: <span id="rev" class="text-blue-600">$ 0</span></div>
            <button onclick="resetSys()" class="bg-red-600 text-white px-4 py-2 text-sm">系統重設</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="active-list"></div>

        <div class="mt-10">
            <h2 class="font-bold border-l-4 border-black pl-2 mb-4">歷史清單與統計</h2>
            <div class="bg-white border border-gray-400 p-4 mb-6">
                <div class="grid grid-cols-2 gap-4 text-sm" id="stock-info"></div>
            </div>
            <table class="w-full bg-white border border-gray-400 text-sm">
                <thead class="bg-gray-200">
                    <tr><th class="border border-gray-400 p-2">單號</th><th class="border border-gray-400 p-2 text-left">內容細節</th><th class="border border-gray-400 p-2">金額</th></tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'orders'), (snap) => {
            const data = snap.val();
            const active = document.getElementById('active-list');
            const history = document.getElementById('history-body');
            let rev = 0; active.innerHTML = ''; history.innerHTML = '';
            
            const stats = {};

            for (let id in data) {
                const o = data[id];
                rev += o.price;
                
                // 統計
                o.items.split(/[;|,|+]/).forEach(s => {
                    let k = s.trim(); if(!k) return;
                    stats[k] = (stats[k] || 0) + 1;
                });

                if (o.status !== 'done') {
                    const card = document.createElement('div');
                    card.className = `border-2 border-black p-4 bg-white ${o.status==='ready'?'bg-yellow-50':''}`;
                    card.innerHTML = `
                        <div class="flex justify-between font-bold border-b border-gray-300 pb-2 mb-2">
                            <span class="text-2xl">#${o.orderNum}</span>
                            <span class="text-lg">$${o.price}</span>
                        </div>
                        <div class="text-sm font-medium mb-4 space-y-1">
                            ${o.items.split(';').map(i=>`<div>• ${i.trim()}</div>`).join('')}
                        </div>
                        <div class="flex gap-2">
                            ${o.status==='waiting'?
                                `<button onclick="u('${id}','ready')" class="w-full bg-black text-white py-2 font-bold">叫號</button>`:
                                `<button onclick="u('${id}','done')" class="w-full bg-green-700 text-white py-2 font-bold">結案</button>`
                            }
                        </div>`;
                    active.appendChild(card);
                }
                const row = history.insertRow(0);
                row.innerHTML = `<td class="border border-gray-400 p-2 text-center font-bold">#${o.orderNum}</td><td class="border border-gray-400 p-2">${o.items}</td><td class="border border-gray-400 p-2 text-center font-bold">$${o.price}</td>`;
            }
            document.getElementById('rev').innerText = `$ ${rev}`;
            document.getElementById('stock-info').innerHTML = Object.entries(stats).map(e=>`<div>${e[0]}: <b>${e[1]}</b></div>`).join('');
        });

        window.u = (id, s) => update(ref(db, 'orders/'+id), {status:s});
        window.resetSys = () => confirm("確定清空所有資料？") && set(ref(db,'/'), {currentNumber:100, orders:null});
    </script>
</body>
</html>
