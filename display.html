<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>叫號系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        .glow-text { text-shadow: 0 0 50px rgba(255, 255, 255, 0.7); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center">
    <div class="text-emerald-500 text-5xl font-black tracking-[1.5em] mb-20 ml-[1.5em] opacity-80 uppercase">Now Ready</div>
    <div id="readyArea" class="flex flex-wrap justify-center gap-24 text-[28rem] font-black text-white glow-text"></div>
    <div class="fixed bottom-10 text-zinc-800 text-xl font-bold tracking-widest uppercase">Ice Cream Pickup</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'orders'), (snapshot) => {
            const data = snapshot.val();
            const area = document.getElementById('readyArea');
            area.innerHTML = '';
            const current = [];
            for (let id in data) { if (data[id].status === 'ready') current.push(data[id].orderNum); }
            area.innerHTML = current.map(n => `<span class="animate-pulse">${n}</span>`).join('');
        });
    </script>
</body>
</html>
