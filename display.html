<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>叫號系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; overflow: hidden; }
        .glow-text { text-shadow: 0 0 40px rgba(255, 255, 255, 0.7); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-10" onclick="start()">
    <div id="hint" class="fixed top-0 w-full bg-emerald-600 text-white py-4 text-center text-2xl font-black animate-pulse cursor-pointer">
        請點擊螢幕開啟「語音叫號」
    </div>

    <h2 class="text-emerald-500 text-4xl font-bold tracking-[1.5em] mb-20 ml-[1.5em] opacity-80 uppercase">Now Ready</h2>
    <div id="readyArea" class="flex flex-wrap justify-center gap-24 text-[26rem] font-black text-white glow-text">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e"
        }));

        let readySet = new Set(); let canSpeak = false;
        window.start = () => { canSpeak = true; document.getElementById('hint').remove(); };

        onValue(ref(db, 'orders'), (snapshot) => {
            const data = snapshot.val();
            const area = document.getElementById('readyArea');
            area.innerHTML = '';
            const current = [];
            for (let id in data) {
                if (data[id].status === 'ready') {
                    const n = data[id].orderNum;
                    current.push(n);
                    if (!readySet.has(n)) {
                        if (canSpeak) {
                            const u = new SpeechSynthesisUtterance(`請 ${n} 號取餐`);
                            u.lang = 'zh-TW'; u.rate = 0.85;
                            window.speechSynthesis.speak(u);
                        }
                    }
                }
            }
            area.innerHTML = current.map(n => `<span class="animate-bounce">${n}</span>`).join('');
            readySet = new Set(current);
        });
    </script>
</body>
</html>
