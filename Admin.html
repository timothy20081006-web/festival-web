<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>後台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">訂單處理中心</h1>
    <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e"
        };

        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'orders'), (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = '';

            for (let id in data) {
                const order = data[id];
                const card = document.createElement('div');
                card.className = `p-5 rounded-lg shadow-md border-t-8 bg-white ${order.status === 'ready' ? 'border-green-500' : 'border-yellow-500'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-3xl font-black">#${order.orderNum}</span>
                        <span class="px-2 py-1 rounded text-xs ${order.status === 'waiting' ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'}">
                            ${order.status === 'waiting' ? '等待中' : '可取餐'}
                        </span>
                    </div>
                    <p class="text-lg text-gray-700 mb-4">${order.items}</p>
                    <div class="flex gap-2">
                        ${order.status === 'waiting' ? 
                            `<button onclick="updateStatus('${id}', 'ready')" class="flex-1 bg-blue-500 text-white py-2 rounded">叫號</button>` :
                            `<button onclick="deleteOrder('${id}')" class="flex-1 bg-gray-500 text-white py-2 rounded">結案</button>`
                        }
                    </div>
                `;
                listDiv.appendChild(card);
            }
        });

        window.updateStatus = (id, status) => update(ref(db, 'orders/' + id), { status });
        window.deleteOrder = (id) => remove(ref(db, 'orders/' + id));
    </script>
</body>
</html>
