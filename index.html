<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>園遊會點餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-extrabold text-orange-600 text-center mb-6">校慶美味攤位</h1>
        
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">請選擇餐點：</label>
                <select id="food" class="w-full border-2 border-orange-200 rounded-xl p-3 focus:outline-none focus:border-orange-500">
                    <option value="招牌大腸包小腸">招牌大腸包小腸 - $50</option>
                    <option value="古早味珍珠奶茶">古早味珍珠奶茶 - $40</option>
                    <option value="噴汁烤香腸">噴汁烤香腸 - $35</option>
                </select>
            </div>

            <button onclick="sendOrder()" id="btn-submit" class="w-full bg-orange-500 text-white text-xl font-bold py-4 rounded-xl hover:bg-orange-600 active:scale-95 transition">
                確認點餐
            </button>
        </div>

        <div id="result" class="mt-8 hidden border-t-2 border-dashed border-gray-200 pt-6 text-center">
            <p class="text-gray-500">點餐完成！您的號碼是：</p>
            <div id="orderNum" class="text-6xl font-black text-orange-600 my-4">--</div>
            <p class="text-sm text-red-500 font-bold">請務必截圖此畫面以利取餐！</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e",
            storageBucket: "school-festival-pos-f2c1e.firebasestorage.app",
            messagingSenderId: "135308112776",
            appId: "1:135308112776:web:6935bd537916dbbda9c03d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.sendOrder = async () => {
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "處理中...";

            const food = document.getElementById('food').value;
            const numRef = ref(db, 'currentNumber');

            try {
                const result = await runTransaction(numRef, (current) => {
                    return (current || 100) + 1;
                });

                if (result.committed) {
                    const nextNum = result.snapshot.val();
                    const newOrderRef = push(ref(db, 'orders'));
                    await set(newOrderRef, {
                        orderNum: nextNum,
                        items: food,
                        status: 'waiting',
                        timestamp: Date.now()
                    });

                    document.getElementById('orderNum').innerText = nextNum;
                    document.getElementById('result').classList.remove('hidden');
                    btn.innerText = "點餐完畢";
                }
            } catch (e) {
                alert("系統忙碌中，請重試！");
                btn.disabled = false;
                btn.innerText = "確認點餐";
            }
        };
    </script>
</body>
</html>
