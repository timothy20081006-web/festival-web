<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look In My Ice 🍦👀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #fff5f7; }
        .plan-btn.active { background-color: #db2777; color: white; border-color: #db2777; }
        .cart-card { border-left: 5px solid #db2777; }
                /* 1. 背景容器與圖案樣式 */
        #bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .bg-icon {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        /* 2. 讓主卡片具有毛玻璃感，背景才透得過來 */
        .main-card-effect {
            background-color: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="p-4 pb-24 flex flex-col items-center">
    <div id="bg-pattern"></div>

    <div class="max-w-md w-full main-card-effect rounded-3xl shadow-xl p-6 border border-pink-100 relative mt-4 z-10">
        <h1 class="text-2xl font-black text-center text-pink-600 mb-6">Look In My Ice 🍦👀</h1>
        
        <div class="grid grid-cols-2 gap-2 mb-6">
            <button onclick="setPlan('single', 67, 1)" id="plan-single" class="plan-btn border-2 p-3 rounded-xl font-bold text-pink-600 transition-all">1球套餐 $67</button>
            <button onclick="setPlan('double', 100, 2)" id="plan-double" class="plan-btn border-2 p-3 rounded-xl font-bold text-pink-600 transition-all">2球套餐 $100</button>
        </div>

        <div id="order-area" class="hidden border-t pt-4">
            <div id="flavor-selectors" class="mb-4 space-y-2"></div>
            <p id="top-title" class="font-bold mb-2 text-pink-600 text-sm"></p>
            <div id="topping-list" class="space-y-2 mb-4"></div>
            <button onclick="addToCart()" class="w-full bg-pink-500 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">
                加入購物車
            </button>
        </div>
    </div>

    <div id="cart-container" class="max-w-md w-full mt-6 hidden">
        <div class="flex justify-between items-center mb-3 px-2">
            <h3 class="font-black text-lg text-gray-700">🛒 待送出訂單</h3>
            <button onclick="clearCart()" class="text-red-400 text-xs font-bold underline">全部清空</button>
        </div>
        
        <div id="cart-items" class="space-y-3"></div>

        <div class="bg-white rounded-2xl shadow-lg p-5 mt-4 border-2 border-pink-200">
            <div class="flex justify-between items-center font-black text-2xl mb-4">
                <span>總計：</span>
                <span class="text-pink-600" id="total-price">$0</span>
            </div>
            <button onclick="sendOrder()" class="w-full bg-black text-white py-4 rounded-xl font-black text-xl hover:bg-gray-800 transition-all">
                正式送出訂單
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e",
            storageBucket: "school-festival-pos-f2c1e.firebasestorage.app",
            messagingSenderId: "135308112776",
            appId: "1:135308112776:web:6935bd537916dbbda9c03d"
        };
        const db = getDatabase(!getApps().length ? initializeApp(firebaseConfig) : getApps()[0]);
                // 背景素材檔案清單 (請確保圖片已上傳至 GitHub 相同資料夾)
        const bgImages = ['1776918594799.png', '1776918594799(1).png', '1776918594799(2).png', '1776918594799(3).png', '1776918594799(4).png', '1776918594799(5).png'];

        function initWallpaper() {
            const container = document.getElementById('bg-pattern');
            if (!container) return;
            
            // 根據螢幕面積動態決定圖片數量
            const count = Math.floor(window.innerWidth * window.innerHeight / 28000); 

            for (let i = 0; i < count; i++) {
                const imgName = bgImages[Math.floor(Math.random() * bgImages.length)];
                const icon = document.createElement('div');
                icon.className = 'bg-icon';
                icon.style.backgroundImage = `url('${imgName}')`;

                // 隨機大小 (65px - 95px)
                const size = Math.floor(Math.random() * 30) + 65;
                icon.style.width = size + 'px';
                icon.style.height = size + 'px';

                // 隨機位置與輕微透明
                icon.style.left = Math.random() * 100 + '%';
                icon.style.top = Math.random() * 100 + '%';
                icon.style.opacity = Math.random() * 0.15 + 0.1; // 設定 10%~25% 透明度
                icon.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;

                container.appendChild(icon);
            }
        }

        // 頁面載入完成後啟動
        window.addEventListener('load', initWallpaper);
        
        let cart = [];
        let curPlan = null;
        let curTops = {"珍珠":0,"寒天":0,"碎餅乾":0,"棉花糖":0,"脆迪酥":0};

        window.setPlan = (id, price, mainCnt) => {
            const limit = (mainCnt === 1) ? 2 : 3;
            curPlan = { id, price, mainCnt, limit };
            document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('plan-'+id).classList.add('active');
            document.getElementById('order-area').classList.remove('hidden');
            document.getElementById('top-title').innerText = `配料 (限 ${limit} 份)：`;
            const fArea = document.getElementById('flavor-selectors');
            fArea.innerHTML = '<p class="font-bold text-gray-600 text-xs">口味：</p>';
            for(let i=0; i<mainCnt; i++) fArea.innerHTML += `<select class="f-sel w-full border-2 p-2 rounded-lg font-bold"><option>椰奶</option><option>荔枝</option><option>Oreo</option></select>`;
            Object.keys(curTops).forEach(n => curTops[n] = 0);
            updateTopUI();
        };

        window.changeTop = (n, d) => {
            const total = Object.values(curTops).reduce((a,b)=>a+b, 0);
            if(d > 0 && total >= curPlan.limit) return;
            if(d < 0 && curTops[n] <= 0) return;
            curTops[n] += d;
            updateTopUI();
        };

        function updateTopUI() {
            const area = document.getElementById('topping-list');
            area.innerHTML = Object.keys(curTops).map(n => `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg border">
                    <span class="font-bold text-gray-700">${n}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeTop('${n}',-1)" class="w-7 h-7 border rounded-full bg-white">-</button>
                        <span class="font-black text-pink-600 w-4 text-center">${curTops[n]}</span>
                        <button onclick="changeTop('${n}',1)" class="w-7 h-7 border rounded-full bg-white">+</button>
                    </div>
                </div>`).join('');
        }

        window.addToCart = () => {
            const flavors = Array.from(document.querySelectorAll('.f-sel')).map(s=>s.value).join('+');
            const tops = Object.entries(curTops).filter(t=>t[1]>0).map(t=>`${t[0]}x${t[1]}`).join(',');
            cart.push({ desc: `${curPlan.mainCnt}球(${flavors})`, tops: tops||'無配料', price: curPlan.price, qty: 1 });
            document.getElementById('cart-container').classList.remove('hidden');
            updateCartUI();
            // 加入後隱藏點餐區以便看清單
            document.getElementById('order-area').classList.add('hidden');
            document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('active'));
        };

        window.clearCart = () => { cart = []; updateCartUI(); };
        window.changeCartQty = (i, d) => {
            cart[i].qty += d;
            if(cart[i].qty <= 0) cart.splice(i, 1);
            updateCartUI();
        };

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map((item, i) => `
                <div class="cart-card bg-white shadow-md p-4 rounded-xl flex justify-between items-center">
                    <div>
                        <div class="font-black text-gray-800">${item.desc}</div>
                        <div class="text-xs text-gray-400">配料: ${item.tops}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeCartQty(${i},-1)" class="w-6 h-6 border rounded font-bold text-gray-400">-</button>
                        <span class="font-black">${item.qty}</span>
                        <button onclick="changeCartQty(${i},1)" class="w-6 h-6 border rounded font-bold text-gray-400">+</button>
                    </div>
                </div>`).join('');
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-price').innerText = `$${total}`;
            if(cart.length === 0) document.getElementById('cart-container').classList.add('hidden');
        }

        window.sendOrder = async () => {
            if(cart.length === 0) return;
            
            // 1. 計算總金額
            const totalPrice = cart.reduce((s, i) => s + (i.price * i.qty), 0);

            // 2. 進行 Firebase 交易以取得流水號
            const numRes = await runTransaction(ref(db, 'currentNumber'), c => (c || 100) + 1);
            const num = numRes.snapshot.val();
            
            // 3. 整理訂單字串
            const itemsStr = cart.map(c => `${c.qty}份 x [${c.desc}] | 配料: ${c.tops}`).join(' ## ');
            
            // 4. 存入資料庫 (狀態設為待製作 waiting)
            await set(push(ref(db, 'orders')), {
                orderNum: num,
                items: itemsStr,
                price: totalPrice,
                status: 'waiting',
                timestamp: Date.now()
            });

            // 5. 渲染「發票式」成功畫面
            document.body.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen p-6 bg-pink-50">
                    <div class="bg-white p-8 rounded-3xl shadow-2xl border-4 border-pink-200 text-center w-full max-w-sm relative overflow-hidden">
                        <div class="absolute -left-4 top-1/2 w-8 h-8 bg-pink-50 rounded-full"></div>
                        <div class="absolute -right-4 top-1/2 w-8 h-8 bg-pink-50 rounded-full"></div>

                        <h1 class="text-xl font-black text-pink-600 mb-2">訂單已送出！號碼：</h1>
                        <div class="text-8xl font-black text-gray-800 mb-6">${num}</div>
                        
                        <div class="text-left bg-gray-50 p-5 rounded-xl border border-dashed border-gray-300 font-mono text-sm">
                            <p class="font-bold border-b border-gray-200 pb-2 mb-3 text-center text-gray-500">--- 點餐明細 ---</p>
                            
                            <div class="space-y-3 mb-4">
                                ${cart.map(item => `
                                    <div class="flex flex-col">
                                        <div class="flex justify-between font-bold text-gray-800">
                                            <span>${item.desc}</span>
                                            <span>x${item.qty}</span>
                                        </div>
                                        <div class="text-xs text-gray-500 pl-2 mt-1">
                                            └ 配料: ${item.tops}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="border-t border-gray-300 pt-2 mt-2 flex justify-between items-center text-lg font-black text-pink-600">
                                <span>合計</span>
                                <span>$${totalPrice}</span>
                            </div>
                        </div>
                        
                        <p class="text-gray-400 text-xs mt-4 mb-6">請記住您的號碼並至櫃檯取餐</p>
                        
                        <button onclick="location.reload()" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-pink-600 transition-all active:scale-95">
                            再點一單
                        </button>
                    </div>
                </div>`;
        };
    </script>
</body>
</html>
