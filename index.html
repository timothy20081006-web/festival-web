<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>園遊會點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #fff5f5 0%, #fff0e6 100%); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex flex-col items-center">
    <div class="max-w-md w-full glass rounded-[2.5rem] shadow-2xl p-8 border-4 border-white">
        <div class="text-center mb-6">
            <span class="text-4xl">🛒</span>
            <h1 class="text-3xl font-black text-orange-600 tracking-tighter mt-2">校慶攤位點餐</h1>
            <p class="text-gray-400 text-xs uppercase tracking-widest mt-1">Smart Ordering System</p>
        </div>
        
        <div class="space-y-4 mb-8">
            <div class="bg-orange-50 p-4 rounded-3xl border-2 border-orange-100">
                <label class="block text-xs font-bold text-orange-400 mb-2 ml-1">選擇餐點</label>
                <select id="food" class="w-full bg-transparent text-lg font-bold text-gray-700 focus:outline-none appearance-none cursor-pointer">
                    <option value="招牌大腸包小腸" data-price="50">招牌大腸包小腸 - $50</option>
                    <option value="古早味珍珠奶茶" data-price="40">古早味珍珠奶茶 - $40</option>
                    <option value="噴汁烤香腸" data-price="35">噴汁烤香腸 - $35</option>
                </select>
            </div>
            <button onclick="addToCart()" class="w-full bg-orange-500 text-white font-black py-4 rounded-2xl hover:bg-orange-600 transition-all shadow-lg shadow-orange-200 active:scale-95">
                ＋ 加入購物車
            </button>
        </div>

        <div class="mb-8">
            <div class="flex justify-between items-center mb-3 px-2">
                <h3 class="font-bold text-gray-700">我的購物清單</h3>
                <button onclick="clearCart()" class="text-xs text-gray-400 hover:text-red-500">清空</button>
            </div>
            <div id="cart-list" class="space-y-2 min-h-[100px] max-h-[300px] overflow-y-auto bg-white/50 rounded-3xl p-4 border border-dashed border-orange-200">
                <p class="text-center text-gray-400 text-sm mt-8">尚未加入任何餐點</p>
            </div>
            <div class="flex justify-between items-center mt-5 px-4 bg-orange-600 p-4 rounded-2xl text-white shadow-lg">
                <span class="font-bold">總計金額</span>
                <span id="total-price" class="text-3xl font-black">$ 0</span>
            </div>
        </div>

        <button onclick="sendOrder()" id="btn-submit" class="w-full bg-slate-900 text-white text-xl font-black py-5 rounded-3xl shadow-xl disabled:opacity-50 transition-all">
            確認送出訂單
        </button>

        <div id="result" class="mt-8 hidden animate-bounce">
            <div class="bg-green-100 rounded-3xl p-6 border-2 border-green-200 text-center">
                <p class="text-green-700 font-bold mb-1">訂單已送出！您的號碼</p>
                <div id="orderNum" class="text-7xl font-black text-green-700 tracking-tighter">--</div>
                <p class="text-xs text-green-600 mt-2">請截圖保存，憑號取餐</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // 貼上你的 Config
        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e",
            storageBucket: "school-festival-pos-f2c1e.firebasestorage.app",
            messagingSenderId: "135308112776",
            appId: "1:135308112776:web:6935bd537916dbbda9c03d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = [];

        window.addToCart = () => {
            const select = document.getElementById('food');
            const name = select.value;
            const price = parseInt(select.options[select.selectedIndex].getAttribute('data-price'));
            cart.push({ name, price });
            updateCartUI();
        };

        window.clearCart = () => { cart = []; updateCartUI(); };

        window.removeFromCart = (index) => { cart.splice(index, 1); updateCartUI(); };

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            const totalDisplay = document.getElementById('total-price');
            if (cart.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 text-sm mt-8">尚未加入任何餐點</p>';
                totalDisplay.innerText = `$ 0`;
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm border border-orange-50">
                        <span class="font-bold text-gray-700">${item.name}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-orange-500 font-bold">$${item.price}</span>
                            <button onclick="removeFromCart(${index})" class="text-red-300 hover:text-red-500 font-bold p-1">✕</button>
                        </div>
                    </div>
                `).join('');
                totalDisplay.innerText = `$ ${cart.reduce((s, i) => s + i.price, 0)}`;
            }
        }

        window.sendOrder = async () => {
            if (cart.length === 0) return alert("購物車目前是空的！");
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "處理中...";

            try {
                const total = cart.reduce((s, i) => s + i.price, 0);
                const itemsString = cart.map(i => i.name).join(', ');

                const result = await runTransaction(ref(db, 'currentNumber'), (cur) => (cur || 100) + 1);
                if (result.committed) {
                    const nextNum = result.snapshot.val();
                    await set(push(ref(db, 'orders')), {
                        orderNum: nextNum, items: itemsString, price: total, status: 'waiting', timestamp: Date.now()
                    });
                    document.getElementById('orderNum').innerText = nextNum;
                    document.getElementById('result').classList.remove('hidden');
                    btn.innerText = "完成點餐";
                    btn.classList.replace('bg-slate-900', 'bg-green-500');
                    cart = []; updateCartUI();
                }
            } catch (e) { alert("發送失敗，請重試"); btn.disabled = false; }
        };
    </script>
</body>
</html>
