<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰淇淋點餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #fff5f7; }
        .checkbox-custom:checked + label { background-color: #db2777; color: white; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-6">
        <h1 class="text-2xl font-bold text-center text-pink-600 mb-6">🍦 校慶冰淇淋</h1>

        <div class="grid grid-cols-2 gap-2 mb-6">
            <button onclick="setPlan('double', 67, 2, 2)" id="plan-double" class="plan-btn border-2 p-3 rounded-xl font-bold">2球套餐 $67</button>
            <button onclick="setPlan('triple', 100, 3, 3)" id="plan-triple" class="plan-btn border-2 p-3 rounded-xl font-bold">3球套餐 $100</button>
        </div>

        <div id="main-section" class="hidden mb-6">
            <p class="font-bold mb-2 text-pink-500">選擇口味：</p>
            <div id="flavor-selectors" class="space-y-2"></div>
        </div>

        <div id="topping-section" class="hidden mb-6">
            <p id="top-title" class="font-bold mb-2 text-pink-500">選擇配料：</p>
            <div class="grid grid-cols-1 gap-2">
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                    <span>珍珠</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeTop('珍珠', -1)" class="w-8 h-8 bg-white border rounded">-</button>
                        <span id="cnt-珍珠" class="font-bold">0</span>
                        <button onclick="changeTop('珍珠', 1)" class="w-8 h-8 bg-white border rounded">+</button>
                    </div>
                </div>
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                    <span>寒天</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeTop('寒天', -1)" class="w-8 h-8 bg-white border rounded">-</button>
                        <span id="cnt-寒天" class="font-bold">0</span>
                        <button onclick="changeTop('寒天', 1)" class="w-8 h-8 bg-white border rounded">+</button>
                    </div>
                </div>
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                    <span>碎餅乾</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeTop('碎餅乾', -1)" class="w-8 h-8 bg-white border rounded">-</button>
                        <span id="cnt-碎餅乾" class="font-bold">0</span>
                        <button onclick="changeTop('碎餅乾', 1)" class="w-8 h-8 bg-white border rounded">+</button>
                    </div>
                </div>
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                    <span>棉花糖</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeTop('棉花糖', -1)" class="w-8 h-8 bg-white border rounded">-</button>
                        <span id="cnt-棉花糖" class="font-bold">0</span>
                        <button onclick="changeTop('棉花糖', 1)" class="w-8 h-8 bg-white border rounded">+</button>
                    </div>
                </div>
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
                    <span>脆迪酥</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeTop('脆迪酥', -1)" class="w-8 h-8 bg-white border rounded">-</button>
                        <span id="cnt-脆迪酥" class="font-bold">0</span>
                        <button onclick="changeTop('脆迪酥', 1)" class="w-8 h-8 bg-white border rounded">+</button>
                    </div>
                </div>
            </div>
            <button onclick="addToCart()" class="w-full bg-pink-500 text-white font-bold py-3 rounded-xl mt-4">加入購物車</button>
        </div>

        <div id="cart-list" class="border-t pt-4 space-y-2 mb-4"></div>
        <div class="flex justify-between font-bold text-xl mb-4"><span>總額:</span><span id="total-price">$0</span></div>
        <button id="btn-submit" onclick="sendOrder()" class="w-full bg-pink-700 text-white py-4 rounded-xl font-bold disabled:bg-gray-300">確認送出訂單</button>
        
        <div id="result" class="mt-4 hidden p-4 bg-green-100 text-green-800 rounded-xl text-center">
            訂單成功！號碼：<span id="orderNum" class="text-4xl font-black block">--</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e",
            storageBucket: "school-festival-pos-f2c1e.firebasestorage.app",
            messagingSenderId: "135308112776",
            appId: "1:135308112776:web:6935bd537916dbbda9c03d"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        let cart = [];
        let curPlan = null;
        let curTops = {};

        window.setPlan = (id, price, mainCnt, topLimit) => {
            curPlan = { id, price, mainCnt, topLimit };
            document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('bg-pink-500','text-white','border-pink-500'));
            document.getElementById('plan-'+id).classList.add('bg-pink-500','text-white','border-pink-500');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('topping-section').classList.remove('hidden');
            document.getElementById('top-title').innerText = `選擇配料 (限 ${topLimit} 份)：`;
            
            const area = document.getElementById('flavor-selectors');
            area.innerHTML = '';
            for(let i=1; i<=mainCnt; i++) {
                area.innerHTML += `<select class="f-sel w-full border p-2 rounded-lg font-bold"><option value="椰奶">椰奶</option><option value="荔枝">荔枝</option><option value="Oreo">Oreo</option></select>`;
            }
            curTops = {"珍珠":0,"寒天":0,"碎餅乾":0,"棉花糖":0,"脆迪酥":0};
            updateTopUI();
        };

        window.changeTop = (name, delta) => {
            const total = Object.values(curTops).reduce((a,b)=>a+b, 0);
            if(delta > 0 && total >= curPlan.topLimit) return;
            if(delta < 0 && curTops[name] <= 0) return;
            curTops[name] += delta;
            updateTopUI();
        };

        function updateTopUI() {
            for(let k in curTops) document.getElementById('cnt-'+k).innerText = curTops[k];
        }

        window.addToCart = () => {
            const totalT = Object.values(curTops).reduce((a,b)=>a+b, 0);
            if(totalT !== curPlan.topLimit) return alert(`配料必須選滿 ${curPlan.topLimit} 份！`);
            const ms = Array.from(document.querySelectorAll('.f-sel')).map(s=>s.value).join('+');
            const ts = Object.entries(curTops).filter(e=>e[1]>0).map(e=>`${e[0]}x${e[1]}`).join(',');
            const desc = `[${curPlan.mainCnt}球] ${ms} | 配料: ${ts}`;
            cart.push({ desc, price: curPlan.price, count: 1 });
            updateCartUI();
        };

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map((item, i) => `<div class="text-sm border-b pb-1 flex justify-between"><span>${item.desc}</span><b>$${item.price}</b></div>`).join('');
            const total = cart.reduce((s,i)=>s+i.price, 0);
            document.getElementById('total-price').innerText = `$${total}`;
        }

        window.sendOrder = async () => {
            if(cart.length === 0) return;
            document.getElementById('btn-submit').disabled = true;
            const res = await runTransaction(ref(db, 'currentNumber'), (c)=> (c||100)+1);
            const num = res.snapshot.val();
            await set(push(ref(db, 'orders')), {
                orderNum: num,
                items: cart.map(i=>i.desc).join('; '),
                price: cart.reduce((s,i)=>s+i.price,0),
                status: 'waiting',
                timestamp: Date.now()
            });
            document.getElementById('orderNum').innerText = num;
            document.getElementById('result').classList.remove('hidden');
            cart = []; updateCartUI();
        };
    </script>
</body>
</html>
