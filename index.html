<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>214 Look In My Ice 🍦👀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #fff5f7; }
        .plan-btn.active { background-color: #db2777; color: white; border-color: #db2777; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-6 border border-pink-100 relative">
        <h1 class="text-2xl font-black text-center text-pink-600 mb-6 relative z-10">Look In My Ice🍦👀</h1>
        
        <div class="absolute -top-10 -left-10 text-8xl opacity-10 rotate-12 z-0">🍦</div>
        <div class="absolute -bottom-10 -right-10 text-8xl opacity-10 -rotate-12 z-0">👀</div>

        <div class="grid grid-cols-2 gap-2 mb-6">
            <button onclick="setPlan('single', 67, 1, 2)" id="plan-single" class="plan-btn border-2 p-3 rounded-xl font-bold text-pink-600">1球套餐 $67</button>
            <button onclick="setPlan('double', 100, 2, 3)" id="plan-double" class="plan-btn border-2 p-3 rounded-xl font-bold text-pink-600">2球套餐 $100</button>
        </div>

        <div id="order-area" class="hidden">
            <div class="mb-6">
                <p class="font-bold mb-2 text-gray-700">選擇口味：</p>
                <div id="flavor-selectors" class="space-y-2"></div>
            </div>
            <div class="mb-6 relative">
                <p id="top-title" class="font-bold mb-2 text-gray-700">選擇配料 (1球2份/2球3份)：</p>
                <div class="space-y-2" id="topping-list"></div>
                <button onclick="addToCart()" class="w-full bg-pink-500 text-white font-bold py-3 rounded-xl mt-6">＋ 加入購物車</button>
            </div>
        </div>

        </div>
</body>
</html>
