<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look In My Ice 🍦👀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    <style>
    <style>
    /* 全面移除粉紅，改用抹茶與森林綠色系 */
    body { 
        font-family: sans-serif; 
        background: #f0f4e8; /* 淺抹茶色底 */
    }

    /* 抹茶牛奶主卡片 */
    .main-card-effect {
        background-color: #D8EAD0 !important; 
        border-radius: 12px !important; /* 縮小圓角 */
        border: 1px solid #A6B896;
        backdrop-filter: blur(8px);
    }

    /* 選單按鈕：選中時變深綠色 */
    .plan-btn {
        border-color: #7A9460;
        color: #7A9460;
    }
    .plan-btn.active { 
        background-color: #7A9460 !important; 
        color: white !important; 
        border-color: #5F744A !important; 
    }

    /* 購物車區塊樣式 */
    .cart-card { border-left: 5px solid #7A9460; }
    
    /* 數量加減按鈕與加入購物車按鈕：全面改為森林深綠 */
    .btn-green-action {
        background-color: #5F744A !important;
        color: white !important;
    }

    /* 原本背景圖片透明度調低 */
    .bg-icon {
        position: absolute;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        opacity: 0.1 !important; /* 調淡背景圖案 */
    }
</style>

</head>
<body class="p-4 pb-24 flex flex-col items-center">
    <div id="bg-pattern"></div>

    <div class="max-w-md w-full bg-[#D8EAD0] rounded-xl shadow-lg relative mt-4 z-10 overflow-hidden border border-[#A6B896]/30">
        <div class="py-6 px-4">
            <h1 class="text-2xl font-black text-center text-[#2D4A22] flex items-center justify-center gap-2">
                Look In My Ice 🍦👀
            </h1>
        </div>
        
        <div class="bg-white/60 backdrop-blur-md p-6 rounded-t-[30px]">
            <p class="font-bold text-[#2D4A22] text-xs mb-2">🍦 經典冰淇淋系列</p>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="setPlan('single', 50, 1, 'Ice Cream')" id="plan-single" class="plan-btn border-2 border-[#7A9460] p-3 rounded-xl font-bold transition-all">1球套餐 $50</button>
                <button onclick="setPlan('double', 90, 2, 'Two Ice Cream')" id="plan-double" class="plan-btn border-2 border-[#7A9460] p-3 rounded-xl font-bold transition-all">2球套餐 $90</button>
            </div>

            <hr class="border-[#A6B896]/30 my-4">

            <p class="font-bold text-[#2D4A22] text-xs mb-2">🍮 手作奶酪系列</p>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="setPlan('panna_1', 40, 0, 'Panna Cotta')" id="plan-panna_1" class="plan-btn border-2 border-[#7A9460] p-3 rounded-xl font-bold transition-all">奶酪 $40</button>
                <button onclick="setPlan('panna_2', 67, 0, 'Two Panna Cotta')" id="plan-panna_2" class="plan-btn border-2 border-[#7A9460] p-3 rounded-xl font-bold transition-all">兩個奶酪 $67</button>
                <button onclick="setPlan('mix', 85, 1, 'Ice+Panna Cotta')" id="plan-mix" class="plan-btn border-2 border-[#7A9460] p-3 rounded-xl font-bold transition-all col-span-2">1球冰+奶酪 $85</button>
            </div>

            <div id="order-area" class="hidden border-t border-[#7A9460]/20 pt-4">
                <div id="flavor-selectors" class="mb-4 space-y-3"></div>
                <p id="top-title" class="font-bold mb-3 text-[#2D4A22] text-sm"></p>
                <div id="topping-list" class="space-y-2 mb-6"></div>
                <button onclick="addToCart()" class="w-full bg-[#5F744A] text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all text-lg">
                    加入購物車
                </button>
            </div>
        </div>
    </div>

    <div id="cart-container" class="max-w-md w-full mt-6 hidden">
        <div class="flex justify-between items-center mb-3 px-2">
            <h3 class="font-black text-lg text-gray-700">🛒 待送出訂單</h3>
            <button onclick="clearCart()" class="text-red-500 text-xs font-bold underline">全部清空</button>
        </div>
        <div id="cart-items" class="space-y-3"></div>
        <div class="bg-white rounded-2xl shadow-lg p-5 mt-4 border-2 border-[#5F744A]">
            <div class="flex justify-between items-center font-black text-2xl mb-4 text-[#2D4A22]">
                <span>總計：</span>
                <span id="total-price">$0</span>
            </div>
            <button onclick="sendOrder()" class="w-full bg-[#2D4A22] text-white py-4 rounded-xl font-black text-xl active:scale-95 transition-all">
                正式送出訂單
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw2axh4vgkOnNEsUgYbkmmV71TJN5Yzqc",
            authDomain: "school-festival-pos-f2c1e.firebaseapp.com",
            databaseURL: "https://school-festival-pos-f2c1e-default-rtdb.firebaseio.com",
            projectId: "school-festival-pos-f2c1e",
            storageBucket: "school-festival-pos-f2c1e.firebasestorage.app",
            messagingSenderId: "135308112776",
            appId: "1:135308112776:web:6935bd537916dbbda9c03d"
        };
        const db = getDatabase(!getApps().length ? initializeApp(firebaseConfig) : getApps()[0]);
                // 背景素材檔案清單 (請確保圖片已上傳至 GitHub 相同資料夾)
        const bgImages = ['1776918594799.png', '1776918594799(1).png', '1776918594799(2).png', '1776918594799(3).png', '1776918594799(4).png', '1776918594799(5).png'];

                                function initWallpaper() {
            const container = document.getElementById('bg-pattern');
            if (!container) return;
            container.innerHTML = ''; // 清空舊的，避免重複生成

            // 1. 強制設定容器寬度為視窗寬度，並確保從最左邊開始
            container.style.width = '100vw';
            container.style.position = 'fixed';
            container.style.left = '0';
            container.style.top = '0';

            const spacing = 140; // 格子間距
            
            // 2. 關鍵修正：多計算幾列 (cols) 與幾行 (rows)，確保鋪滿且超出邊界
            const cols = Math.ceil(window.innerWidth / spacing) + 3; 
            const rows = Math.ceil(window.innerHeight / spacing) + 3;

            let imgIdx = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const imgName = bgImages[imgIdx % bgImages.length];
                    const icon = document.createElement('div');
                    icon.className = 'bg-icon';
                    icon.style.backgroundImage = `url('${imgName}')`;

                    icon.style.width = '85px';
                    icon.style.height = '85px';
                    
                    // 3. 讓起始點稍微往左偏移一些 (-40px)，消除邊緣可能的空白
                    icon.style.left = (c * spacing - 40) + 'px';
                    icon.style.top = (r * spacing - 40) + 'px';
                    
                    // 顏色與旋轉設定 (已移除粉色調)
                    icon.style.opacity = '0.12';
                    icon.style.transform = 'rotate(-15deg)';

                    container.appendChild(icon);
                    imgIdx++;
                }
            }
        }


        // 頁面載入完成後啟動
        window.addEventListener('load', initWallpaper);
        
        let cart = [];
        let curPlan = null;
        let curTops = {"珍珠":0,"寒天":0,"碎餅乾":0,"棉花糖":0,"脆迪酥":0};

        window.setPlan = (id, price, mainCnt, displayName) => {
            // 判斷配料數量限制
            let limit = 0;
            
            // 修改這裡：讓 panna_1 和 panna_2 都沒有配料
            if (id === 'panna_1' || id === 'panna_2') {
                limit = 0;
            } else if (id === 'mix') {
                limit = 2; // 1球冰+奶酪 套餐給 2 份配料
            } else {
                // 純冰淇淋套餐：1球給 2 份，2球給 3 份
                limit = (mainCnt === 1) ? 2 : 3; 
            }
            
            curPlan = { id, price, mainCnt, limit, displayName };
            
            document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('plan-'+id).classList.add('active');
            document.getElementById('order-area').classList.remove('hidden');
            
            // --- 口味選擇器 (冰淇淋) ---
            const fArea = document.getElementById('flavor-selectors');
            if (mainCnt > 0) {
                fArea.innerHTML = '<p class="font-bold text-[#2D4A22] text-xs">冰淇淋口味：</p>';
                for(let i=0; i<mainCnt; i++) {
                    fArea.innerHTML += `<select class="f-sel w-full border-2 p-2 rounded-lg font-bold border-[#A6B896]"><option>椰奶</option><option>荔枝</option><option>Oreo</option></select>`;
                }
                fArea.classList.remove('hidden');
            } else {
                fArea.innerHTML = '';
                fArea.classList.add('hidden');
            }

            // --- 關鍵修改：處理配料顯示 ---
            const topTitle = document.getElementById('top-title');
            const topList = document.getElementById('topping-list');

            if (limit === 0) {
                // 如果限額是 0，直接顯示提示並隱藏清單
                topTitle.innerText = "此品項不含配料";
                topTitle.className = "font-bold mb-3 text-gray-400 text-sm italic"; // 變成灰色斜體
                topList.innerHTML = ""; 
                topList.classList.add('hidden');
            } else {
                // 如果有配料，顯示限額並更新 UI
                topTitle.innerText = `配料 (限 ${limit} 份)：`;
                topTitle.className = "font-bold mb-3 text-[#2D4A22] text-sm"; // 恢復綠色
                topList.classList.remove('hidden');
                Object.keys(curTops).forEach(n => curTops[n] = 0);
                updateTopUI();
            }
        };

        function updateTopUI() {
            const area = document.getElementById('topping-list');
            area.innerHTML = Object.keys(curTops).map(n => `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg border">
                    <span class="font-bold text-gray-700">${n}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeTop('${n}',-1)" class="w-7 h-7 border rounded-full bg-white">-</button>
                        <span class="font-black text-[#5F744A] w-4 text-center">${curTops[n]}</span>
                        <button onclick="changeTop('${n}',1)" class="w-7 h-7 border rounded-full bg-white">+</button>
                    </div>
                </div>`).join('');
        }

        // 找到這段並替換
        window.addToCart = () => {
            const flavors = Array.from(document.querySelectorAll('.f-sel')).map(s=>s.value).join('+');
            const tops = Object.entries(curTops).filter(t=>t[1]>0).map(t=>`${t[0]}x${t[1]}`).join(',');
    
            // 組合名稱：如果有口味就顯示「名稱(口味)」，沒有就只顯示「名稱」
            const itemName = flavors ? `${curPlan.displayName}(${flavors})` : curPlan.displayName;
    
            cart.push({ desc: itemName, tops: tops||'無配料', price: curPlan.price, qty: 1 });
    
            document.getElementById('cart-container').classList.remove('hidden');
            updateCartUI();
            document.getElementById('order-area').classList.add('hidden');
            document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('active'));
        };


        window.clearCart = () => { cart = []; updateCartUI(); };
        window.changeCartQty = (i, d) => {
            cart[i].qty += d;
            if(cart[i].qty <= 0) cart.splice(i, 1);
            updateCartUI();
        };

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map((item, i) => `
                <div class="cart-card bg-white shadow-md p-4 rounded-xl flex justify-between items-center">
                    <div>
                        <div class="font-black text-gray-800">${item.desc}</div>
                        <div class="text-xs text-gray-400">配料: ${item.tops}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeCartQty(${i},-1)" class="w-6 h-6 border rounded font-bold text-gray-400">-</button>
                        <span class="font-black">${item.qty}</span>
                        <button onclick="changeCartQty(${i},1)" class="w-6 h-6 border rounded font-bold text-gray-400">+</button>
                    </div>
                </div>`).join('');
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-price').innerText = `$${total}`;
            if(cart.length === 0) document.getElementById('cart-container').classList.add('hidden');
        }

        window.sendOrder = async () => {
            if(cart.length === 0) return;
            
            // 1. 計算總金額
            const totalPrice = cart.reduce((s, i) => s + (i.price * i.qty), 0);

            // 2. 進行 Firebase 交易以取得流水號
            const numRes = await runTransaction(ref(db, 'currentNumber'), c => (c || 100) + 1);
            const num = numRes.snapshot.val();
            
            // 3. 整理訂單字串
            const itemsStr = cart.map(c => `${c.qty}份 x [${c.desc}] | 配料: ${c.tops}`).join(' ## ');
            
            // 4. 存入資料庫 (狀態設為待製作 waiting)
            await set(push(ref(db, 'orders')), {
                orderNum: num,
                items: itemsStr,
                price: totalPrice,
                status: 'waiting',
                timestamp: Date.now()
            });

            // 5. 渲染「發票式」成功畫面
            document.body.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen p-6 bg-[#f0f4e8]">
                    <div class="bg-white p-8 rounded-2xl shadow-2xl border-4 border-[#D8EAD0] text-center w-full max-w-sm relative overflow-hidden">
                        <div class="absolute -left-4 top-1/2 w-8 h-8 bg-[#f0f4e8] rounded-full"></div>
                        <div class="absolute -right-4 top-1/2 w-8 h-8 bg-[#f0f4e8] rounded-full"></div>

                        <h1 class="text-xl font-black text-[#5F744A] mb-2">訂單已送出！號碼：</h1>
                        <div class="text-8xl font-black text-gray-800 mb-6">${num}</div>
                        
                        <div class="text-left bg-gray-50 p-5 rounded-xl border border-dashed border-gray-300 font-mono text-sm">
                            <p class="font-bold border-b border-gray-200 pb-2 mb-3 text-center text-gray-400">--- 點餐明細 ---</p>
                            
                            <div class="space-y-3 mb-4">
                                ${cart.map(item => `
                                    <div class="flex flex-col">
                                        <div class="flex justify-between font-bold text-gray-800">
                                            <span>${item.desc}</span>
                                            <span>x${item.qty}</span>
                                        </div>
                                        <div class="text-xs text-gray-500 pl-2 mt-1">
                                            └ 配料: ${item.tops}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="border-t border-gray-300 pt-2 mt-2 flex justify-between items-center text-lg font-black text-[#5F744A]">
                                <span>合計</span>
                                <span>$${totalPrice}</span>
                            </div>
                        </div>
                        
                        <p class="text-gray-400 text-xs mt-4 mb-6">請記住您的號碼並至櫃檯取餐</p>
                        
                        <button onclick="location.reload()" class="w-full bg-[#5F744A] text-white py-4 rounded-xl font-bold shadow-lg hover:bg-[#4A5D39] transition-all active:scale-95">
                            再點一單
                        </button>
                    </div>
                </div>`;
        };
    </script>
</body>
</html>
